services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file: .env
    restart: unless-stopped
    # 포트는 외부 노출 불필요 — nginx가 내부에서 직접 접근
